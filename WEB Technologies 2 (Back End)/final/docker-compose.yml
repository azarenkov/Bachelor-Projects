version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-finding-app
    restart: unless-stopped
    ports:
      - "3000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/job_finding?authSource=admin
      - JWT_SECRET=your-secret-key-change-in-production
    depends_on:
      - mongodb
    volumes:
      - ./uploads:/usr/src/app/uploads
    networks:
      - job-finding-network

  mongodb:
    image: mongo:7.0
    container_name: job-finding-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: job_finding
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - job-finding-network

  mongo-express:
    image: mongo-express:latest
    container_name: job-finding-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - job-finding-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  job-finding-network:
    driver: bridge
