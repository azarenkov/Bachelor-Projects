<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobConnect - Find Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="jobs.html">
                <i class="bi bi-briefcase-fill"></i> JobConnect
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="jobs.html">Find Jobs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="applications.html">My Applications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="saved-jobs.html">Saved Jobs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Filters Sidebar -->
            <div class="col-md-3">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Filters</h5>
                        <form id="filterForm">
                            <div class="mb-3">
                                <label class="form-label">Search</label>
                                <input type="text" class="form-control" id="searchInput" placeholder="Job title...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" id="locationInput" placeholder="City...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Job Type</label>
                                <select class="form-select" id="typeSelect">
                                    <option value="">All Types</option>
                                    <option value="full-time">Full-time</option>
                                    <option value="part-time">Part-time</option>
                                    <option value="contract">Contract</option>
                                    <option value="internship">Internship</option>
                                    <option value="remote">Remote</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Min Salary</label>
                                <input type="number" class="form-control" id="salaryMinInput" placeholder="Min">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Max Salary</label>
                                <input type="number" class="form-control" id="salaryMaxInput" placeholder="Max">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Apply Filters</button>
                            <button type="button" class="btn btn-outline-secondary w-100 mt-2" onclick="clearFilters()">Clear</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Jobs List -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 id="jobCount">Loading jobs...</h4>
                </div>
                
                <div id="jobsContainer">
                    <!-- Jobs will be loaded here -->
                </div>

                <!-- Pagination -->
                <nav id="pagination" class="mt-4"></nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/jobs.js"></script>
</body>
</html>
