<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Company - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="employer-dashboard.html">
                <i class="bi bi-briefcase-fill"></i> JobConnect - Employer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="employer-dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="my-company.html">My Company</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <!-- View Mode -->
                <div class="card shadow-sm" id="viewMode" style="display: none;">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="mb-0">My Company</h3>
                            <button class="btn btn-primary" onclick="toggleEditMode()">
                                <i class="bi bi-pencil"></i> Edit
                            </button>
                        </div>
                        
                        <div id="companyView">
                            <!-- Company info will be displayed here -->
                        </div>
                    </div>
                </div>

                <!-- Edit/Create Mode -->
                <div class="card shadow-sm" id="editMode">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="mb-0" id="formTitle">Create Company Profile</h3>
                            <button class="btn btn-outline-secondary d-none" id="cancelBtn" onclick="toggleEditMode()">
                                Cancel
                            </button>
                        </div>
                        
                        <div id="successAlert" class="alert alert-success d-none"></div>
                        <div id="errorAlert" class="alert alert-danger d-none"></div>
                        
                        <form id="companyForm">
                            <input type="hidden" id="companyId">
                            <div class="mb-3">
                                <label for="name" class="form-label">Company Name *</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="4" placeholder="Tell us about your company..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="website" class="form-label">Website</label>
                                <input type="url" class="form-control" id="website" placeholder="https://example.com">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="industry" class="form-label">Industry</label>
                                    <input type="text" class="form-control" id="industry" placeholder="Technology, Finance, etc.">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="size" class="form-label">Company Size</label>
                                    <select class="form-select" id="size">
                                        <option value="">Select size...</option>
                                        <option value="1-10">1-10</option>
                                        <option value="11-50">11-50</option>
                                        <option value="51-200">51-200</option>
                                        <option value="201-500">201-500</option>
                                        <option value="501-1000">501-1000</option>
                                        <option value="1000+">1000+</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="location" class="form-label">Location</label>
                                <input type="text" class="form-control" id="location" placeholder="City, Country">
                            </div>

                            <div class="mb-3">
                                <label for="logo" class="form-label">Logo URL</label>
                                <input type="url" class="form-control" id="logo" placeholder="https://example.com/logo.png">
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <span class="spinner-border spinner-border-sm d-none" id="saveSpinner"></span>
                                    <span id="submitBtnText">Save Company</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/my-company.js"></script>
</body>
</html>
