<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard - JobConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="employer-dashboard.html">
                <i class="bi bi-briefcase-fill"></i> JobConnect - Employer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="employer-dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my-company.html">My Company</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>My Job Postings</h3>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#jobModal" onclick="openJobModal()">
                        <i class="bi bi-plus-circle"></i> Post New Job
                    </button>
                </div>

                <div id="companyWarning" class="alert alert-warning d-none">
                    <i class="bi bi-exclamation-triangle"></i> Please create a company profile first before posting jobs.
                    <a href="my-company.html" class="alert-link">Create Company</a>
                </div>

                <div id="jobsContainer">
                    <!-- Jobs will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Job Modal -->
    <div class="modal fade" id="jobModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="jobModalTitle">Create Job Posting</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="jobAlert" class="alert d-none"></div>
                    <form id="jobForm">
                        <input type="hidden" id="jobId">
                        <div class="mb-3">
                            <label for="company" class="form-label">Company *</label>
                            <select class="form-select" id="company" required>
                                <option value="">Select company...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">Job Title *</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description *</label>
                            <textarea class="form-control" id="description" rows="4" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="location" class="form-label">Location</label>
                                <input type="text" class="form-control" id="location">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="type" class="form-label">Type</label>
                                <select class="form-select" id="type">
                                    <option value="full-time">Full-time</option>
                                    <option value="part-time">Part-time</option>
                                    <option value="contract">Contract</option>
                                    <option value="internship">Internship</option>
                                    <option value="remote">Remote</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="salaryMin" class="form-label">Min Salary</label>
                                <input type="number" class="form-control" id="salaryMin">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="salaryMax" class="form-label">Max Salary</label>
                                <input type="number" class="form-control" id="salaryMax">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="currency" class="form-label">Currency</label>
                                <select class="form-select" id="currency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="GBP">GBP</option>
                                    <option value="KZT">KZT</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="skills" class="form-label">Required Skills (comma separated)</label>
                            <input type="text" class="form-control" id="skills" placeholder="JavaScript, React, Node.js">
                        </div>
                        <div class="mb-3">
                            <label for="requirements" class="form-label">Requirements (one per line)</label>
                            <textarea class="form-control" id="requirements" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="responsibilities" class="form-label">Responsibilities (one per line)</label>
                            <textarea class="form-control" id="responsibilities" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status">
                                <option value="active">Active</option>
                                <option value="draft">Draft</option>
                                <option value="closed">Closed</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <span class="spinner-border spinner-border-sm d-none" id="jobSpinner"></span>
                            Save Job
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Applicants Modal -->
    <div class="modal fade" id="applicantsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Job Applicants</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="applicantsContainer">
                        <!-- Applicants will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/employer-dashboard.js"></script>
</body>
</html>
