name: shop-api CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - "observability/**"
      - "terraform/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/shop-api

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: app/go.sum

      - name: Vet & build
        working-directory: app
        run: |
          go vet ./...
          go build ./...

  docker-publish:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
    steps:
      - name: Skip when no cluster configured
        if: env.KUBECONFIG_B64 == ''
        run: |
          echo "KUBECONFIG_B64 secret not set — running in demo mode, skipping deploy."
          echo "Image that would be deployed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"

      - uses: actions/checkout@v4
        if: env.KUBECONFIG_B64 != ''

      - name: Configure kubectl
        if: env.KUBECONFIG_B64 != ''
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_B64" | base64 -d > $HOME/.kube/config
          kubectl config view --minify

      - name: Roll out new image
        if: env.KUBECONFIG_B64 != ''
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          echo "Deploying $IMAGE"
          kubectl -n shop set image deployment/shop-api shop-api="$IMAGE"
          kubectl -n shop rollout status deployment/shop-api --timeout=2m

      - name: Smoke test
        if: env.KUBECONFIG_B64 != ''
        run: |
          kubectl -n shop wait --for=condition=Available --timeout=120s deployment/shop-api
          kubectl -n shop get deploy,pod,hpa
