global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default-receiver
  routes:
    - matchers:
        - severity = critical
      receiver: critical-receiver
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: default-receiver
    # No-op receiver (logs to Alertmanager UI only).
    # Replace with real integration (e.g. Slack, email) in production.

  - name: critical-receiver
    # No-op receiver for critical alerts.
    # Replace with PagerDuty / Slack / email in production.

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname"]
