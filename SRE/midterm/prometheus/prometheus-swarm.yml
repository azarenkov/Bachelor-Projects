global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Discover every backend replica via Swarm's tasks.<service> DNS A-record.
  # This bypasses the VIP load balancer so each task is scraped individually.
  - job_name: analytical-platform
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - tasks.backend
        type: A
        port: 3000

  # node_exporter runs in `mode: global` (one per swarm node).
  - job_name: node_exporter
    dns_sd_configs:
      - names:
          - tasks.node_exporter
        type: A
        port: 9100

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
