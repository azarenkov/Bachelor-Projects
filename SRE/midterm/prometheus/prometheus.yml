global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: analytical-platform
    static_configs:
      - targets:
          - backend:3000
    metrics_path: /metrics

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
