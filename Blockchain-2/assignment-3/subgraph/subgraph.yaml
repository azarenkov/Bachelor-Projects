specVersion: 1.0.0
description: Subgraph indexing GameItems (ERC-1155) and Vault (ERC-4626) events.
repository: https://github.com/example/assignment-3-subgraph
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: GameItems
    network: arbitrum-sepolia
    source:
      # Replace with the deployed address from script/DeployL2.s.sol
      address: "0x0000000000000000000000000000000000000000"
      abi: GameItems
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mapping.ts
      entities:
        - Account
        - Token
        - TransferSingle
        - TransferBatch
        - CraftEvent
      abis:
        - name: GameItems
          file: ./abis/GameItems.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: ItemCrafted(indexed address,indexed uint256)
          handler: handleItemCrafted

  - kind: ethereum/contract
    name: Vault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Vault
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mapping.ts
      entities:
        - User
        - VaultDeposit
        - VaultWithdrawal
        - HarvestEvent
        - LiquiditySnapshot
      abis:
        - name: Vault
          file: ./abis/Vault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Harvested(uint256,uint256)
          handler: handleHarvested
