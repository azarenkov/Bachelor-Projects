[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
gas_reports = ["SimpleAMM", "YieldVault", "ProtocolGovernor", "GovToken", "VaultFactory", "YulMath"]
fs_permissions = [{ access = "read-write", path = "./deployments" }]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 32
depth = 32
fail_on_revert = false

[profile.ci.fuzz]
runs = 1024

[profile.ci.invariant]
runs = 128
depth = 64

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
sort_imports = true

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = "arbitrum-sepolia", url = "https://api-sepolia.arbiscan.io/api" }
