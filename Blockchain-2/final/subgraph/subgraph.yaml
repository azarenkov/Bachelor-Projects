specVersion: 0.0.5
description: Indexer for Protocol — AMM, Vault, Governor, and Factory events
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: SimpleAMM
    network: arbitrum-sepolia

    source:
      # Filled in after deployment — see deployments/421614.json
      address: "0xD66bEaf12306c72d0Ef7b3a3Ee657CbECb9BdEe3"
      abi: SimpleAMM
      startBlock: 269200800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/amm.ts
      entities:
        - Pool
        - Swap
        - LiquidityChange
      abis:
        - name: SimpleAMM
          file: ../out/SimpleAMM.sol/SimpleAMM.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,uint256,uint256,indexed address)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Sync(uint112,uint112)
          handler: handleSync

  - kind: ethereum/contract
    name: VaultFactory
    network: arbitrum-sepolia

    source:
      address: "0x953FeC985064516279B9bA117048614fC24460CA"
      abi: VaultFactory
      startBlock: 269200800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/factory.ts
      entities:
        - Vault
      abis:
        - name: VaultFactory
          file: ../out/VaultFactory.sol/VaultFactory.json
      eventHandlers:
        - event: VaultDeployed(indexed address,indexed address,indexed address,bool,bytes32)
          handler: handleVaultDeployed

  - kind: ethereum/contract
    name: ProtocolGovernor
    network: arbitrum-sepolia

    source:
      address: "0xe4aD6080604EAA6b8eF30A61868dC48EBD71f732"
      abi: ProtocolGovernor
      startBlock: 269200800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/governor.ts
      entities:
        - Proposal
        - Vote
      abis:
        - name: ProtocolGovernor
          file: ../out/ProtocolGovernor.sol/ProtocolGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
