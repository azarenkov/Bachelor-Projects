[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.26"

[profile.default.fuzz]
runs = 1000
seed = "0x1"

[profile.default.invariant]
runs = 500
depth = 50

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]
