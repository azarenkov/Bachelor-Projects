<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DAO Governance dApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 2em; max-width: 980px; margin-inline: auto; }
    h1 { margin-top: 0; }
    section { background: #1e293b; padding: 1.5em; border-radius: 10px; margin-bottom: 1.5em; }
    h2 { margin-top: 0; color: #93c5fd; }
    button { background: #2563eb; color: white; border: 0; padding: 0.55em 1em; border-radius: 6px; cursor: pointer; font-size: 0.95em; margin-right: 0.5em; }
    button:hover { background: #1d4ed8; }
    button.danger { background: #dc2626; } button.danger:hover { background: #b91c1c; }
    button.ghost { background: #334155; } button.ghost:hover { background: #475569; }
    input { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; padding: 0.5em 0.7em; border-radius: 6px; font-family: inherit; font-size: 0.95em; width: 28em; max-width: 100%; }
    code, .mono { font-family: "SF Mono", Menlo, monospace; font-size: 0.85em; color: #94a3b8; }
    .row { display: flex; flex-wrap: wrap; gap: 0.6em; align-items: center; margin-top: 0.6em; }
    .stat { background: #0f172a; padding: 0.5em 0.9em; border-radius: 6px; border: 1px solid #334155; }
    .stat b { color: #e2e8f0; }
    #log { background: #020617; border-radius: 6px; padding: 1em; white-space: pre-wrap; font-family: "SF Mono", Menlo, monospace; font-size: 0.8em; color: #94a3b8; max-height: 240px; overflow-y: auto; }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 0.8em; font-weight: 600; }
    .pill.Pending  { background: #334155; }
    .pill.Active   { background: #2563eb; }
    .pill.Defeated { background: #b91c1c; }
    .pill.Succeeded, .pill.Queued, .pill.Executed { background: #16a34a; }
    .pill.Canceled, .pill.Expired { background: #475569; }
  </style>
</head>
<body>
  <h1>DAO Governance dApp</h1>
  <section>
    <h2>1. Connect wallet</h2>
    <button id="btn-connect">Connect MetaMask</button>
    <div class="row">
      <div class="stat">Account: <b id="account">—</b></div>
      <div class="stat">Network: <b id="network">—</b></div>
    </div>
  </section>

  <section>
    <h2>2. Token, voting power, delegate</h2>
    <div class="row">
      <div class="stat">Balance: <b id="balance">—</b> GOV</div>
      <div class="stat">Voting power: <b id="votes">—</b> GOV</div>
      <div class="stat">Current delegate: <code id="delegate">—</code></div>
    </div>
    <div class="row">
      <input id="delegate-input" placeholder="0x… delegatee (leave empty for self-delegate)">
      <button id="btn-delegate">Delegate votes</button>
    </div>
  </section>

  <section>
    <h2>3. Active proposals</h2>
    <button id="btn-refresh" class="ghost">Refresh proposals</button>
    <div id="proposals" style="margin-top: 1em;"></div>
  </section>

  <section>
    <h2>4. Activity log</h2>
    <div id="log"></div>
  </section>

  <script type="module" src="./app.js"></script>
</body>
</html>
