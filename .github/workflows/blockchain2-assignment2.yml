name: Smart Contract CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Build & Test ────────────────────────────────────────────────────
  test:
    name: Forge Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Forge dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts --no-commit
        working-directory: Blockchain-2/assignment-2

      - name: Compile contracts
        run: forge build --sizes
        working-directory: Blockchain-2/assignment-2

      - name: Run unit, fuzz & invariant tests
        run: forge test -v
        working-directory: Blockchain-2/assignment-2
        env:
          # Optional: set a mainnet RPC URL to enable fork tests
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Generate gas report
        run: forge test --gas-report --match-contract "AMMTest|LendingPoolTest" 2>&1 | tee gas-report.txt
        working-directory: Blockchain-2/assignment-2

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: Blockchain-2/assignment-2/gas-report.txt

  # ── Stage 2: Coverage ────────────────────────────────────────────────────────
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Forge dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts --no-commit
        working-directory: Blockchain-2/assignment-2

      - name: Generate coverage report (lcov)
        run: forge coverage --report lcov
        working-directory: Blockchain-2/assignment-2

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: Blockchain-2/assignment-2/lcov.info

  # ── Stage 3: Static Analysis (Slither) ───────────────────────────────────────
  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry (for remappings)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Install Forge dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts --no-commit
        working-directory: Blockchain-2/assignment-2

      - name: Compile contracts for Slither
        run: forge build --build-info
        working-directory: Blockchain-2/assignment-2

      - name: Run Slither
        # Continue on error so the job uploads the report even when findings exist
        continue-on-error: true
        run: |
          slither . \
            --foundry-out-directory out \
            --checklist \
            --markdown-root . \
            2>&1 | tee slither-report.md
        working-directory: Blockchain-2/assignment-2

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: Blockchain-2/assignment-2/slither-report.md
